# docker-compose.yml — Full stack deployment
# Run: docker-compose up -d

version: '3.9'

services:
  # ── MongoDB ─────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: affiliate_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: affiliate_platform
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - affiliate_net

  # ── Redis Cache ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: affiliate_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - affiliate_net

  # ── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: affiliate_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/affiliate_platform?authSource=admin
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AMAZON_ACCESS_KEY: ${AMAZON_ACCESS_KEY}
      AMAZON_SECRET_KEY: ${AMAZON_SECRET_KEY}
      AMAZON_PARTNER_TAG: ${AMAZON_PARTNER_TAG}
      FLIPKART_TRACKING_ID: ${FLIPKART_TRACKING_ID}
      FLIPKART_TOKEN: ${FLIPKART_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PUBLISH_AUTO: "true"
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    networks:
      - affiliate_net

  # ── Cron Scheduler ──────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: affiliate_scheduler
    restart: unless-stopped
    command: node automation/scheduler.js
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/affiliate_platform?authSource=admin
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AMAZON_ACCESS_KEY: ${AMAZON_ACCESS_KEY}
      AMAZON_SECRET_KEY: ${AMAZON_SECRET_KEY}
      AMAZON_PARTNER_TAG: ${AMAZON_PARTNER_TAG}
      FLIPKART_TRACKING_ID: ${FLIPKART_TRACKING_ID}
      FLIPKART_TOKEN: ${FLIPKART_TOKEN}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      PUBLISH_AUTO: "true"
    depends_on:
      - mongodb
    networks:
      - affiliate_net

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:5000
        NEXT_PUBLIC_SITE_NAME: "DealFinder India"
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://dealfinder.in}
    container_name: affiliate_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - affiliate_net

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: affiliate_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Mount your SSL certs here
    depends_on:
      - frontend
      - backend
    networks:
      - affiliate_net

volumes:
  mongo_data:

networks:
  affiliate_net:
    driver: bridge
